title: "Coin Shows Near Me — US Coin Show Directory"
description: "Find coin shows near you. Complete directory of 90+ coin shows across all 50 US states with dates, venues, details, and pre-show offers from verified dealers."
url: "https://nezumitora.github.io"
baseurl: "/coin-shows-near-me"

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-seo-tag

markdown: kramdown

search_enabled: true
nav_enabled: true

# SEO
lang: en-US
tagline: "Find upcoming coin shows in your area"

# just-the-docs nav
nav_sort: order
nav_external_links: []

aux_links:
  "Get Offers":
    - "/coin-shows-near-me/get-offers/"
aux_links_new_tab: false

