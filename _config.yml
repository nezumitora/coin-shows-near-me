#   promoter_submit: "https://formspree.io/f/YOUR_ID"
#   attendee_inventory: "https://formspree.io/f/YOUR_ID"

google_site_verification: ZW60JDUpZFD9rhZv8KgiklQ65RSr5jyyxku3686lHbo

# Exclude build artifacts
