<style>
/* === Coin Shows Near Me — Custom Theme === */

/* Color scheme: gold/amber for coins, dark navy for trust */
:root {
  --coin-gold: #b8860b;
  --coin-gold-light: #daa520;
  --coin-gold-bg: #faf6ed;
  --coin-navy: #1a2332;
  --coin-navy-light: #2c3e50;
  --coin-border: #e5e0d0;
  --coin-text: #2c2c2c;
  --coin-muted: #6b7280;
}

/* Sidebar — dark navy with gold accents */
.side-bar {
  background-color: var(--coin-navy) !important;
  border-right: 3px solid var(--coin-gold) !important;
}
.site-header {
  padding-top: 0.5rem !important;
}
.site-logo {
  width: 80px !important;
  height: 80px !important;
  margin: 0 auto 0.5rem auto;
  border-radius: 10px;
  background-size: contain !important;
  background-repeat: no-repeat !important;
  background-position: center !important;
}
.site-title {
  color: var(--coin-gold-light) !important;
  font-size: 1.1rem !important;
  font-weight: 700 !important;
  letter-spacing: 0.02em;
}
.site-nav .nav-list-link {
  color: #cbd5e1 !important;
  font-size: 0.85rem !important;
}
.site-nav .nav-list-link:hover,
.site-nav .nav-list-link.active {
  color: var(--coin-gold-light) !important;
  background-color: rgba(218, 165, 32, 0.1) !important;
}
.site-footer {
  color: #64748b !important;
  font-size: 0.75rem !important;
}
.site-footer a {
  color: #94a3b8 !important;
}

/* Mobile menu button */
.site-button {
  color: var(--coin-gold-light) !important;
}

/* Main content area */
.main-content h1 {
  color: var(--coin-navy) !important;
  border-bottom: 2px solid var(--coin-gold) !important;
  padding-bottom: 0.5rem;
}
.main-content h2 {
  color: var(--coin-navy-light) !important;
}

/* State grid cards — warmer, more polished */
.main-content a[href^="/states/"] {
  border-color: var(--coin-border) !important;
  background: var(--coin-gold-bg) !important;
  transition: all 0.2s ease !important;
}
.main-content a[href^="/states/"]:hover {
  border-color: var(--coin-gold) !important;
  background: #f5edd6 !important;
  box-shadow: 0 2px 8px rgba(184, 134, 11, 0.15) !important;
  transform: translateY(-1px) !important;
}

/* Search bar styling */
.search-input {
  border-color: var(--coin-border) !important;
}
.search-input:focus {
  border-color: var(--coin-gold) !important;
  box-shadow: 0 0 0 3px rgba(218, 165, 32, 0.2) !important;
}

/* Aux nav button (Melt Calculator) */
.aux-nav .site-button {
  background-color: var(--coin-gold) !important;
  color: #fff !important;
  border-radius: 6px !important;
  font-weight: 600 !important;
  padding: 0.4rem 0.8rem !important;
  font-size: 0.85rem !important;
}
.aux-nav .site-button:hover {
  background-color: var(--coin-gold-light) !important;
}

/* Links — gold instead of default blue */
.main-content a {
  color: var(--coin-gold) !important;
}
.main-content a:hover {
  color: var(--coin-gold-light) !important;
}

/* Show cards (used on state/city pages) */
.show-card {
  border-color: var(--coin-border) !important;
  background: var(--coin-gold-bg) !important;
  border-radius: 0.5rem !important;
}

/* Launch banner */
.launch-banner {
  background: linear-gradient(135deg, var(--coin-navy) 0%, var(--coin-navy-light) 100%);
  color: #f1f5f9;
  padding: 1rem 1.5rem;
  border-radius: 8px;
  margin-bottom: 1.5rem;
  border-left: 4px solid var(--coin-gold);
  font-size: 0.95rem;
  line-height: 1.5;
}
.launch-banner strong {
  color: var(--coin-gold-light);
}

/* Notify / contact form */
.notify-section {
  background: var(--coin-gold-bg);
  border: 1px solid var(--coin-border);
  border-radius: 8px;
  padding: 1.5rem;
  margin: 2rem 0;
}
.notify-section h3 {
  color: var(--coin-navy) !important;
  margin-top: 0 !important;
  border-bottom: none !important;
}
.notify-section p {
  color: var(--coin-text);
  font-size: 0.95rem;
  margin-bottom: 1rem;
}
.notify-form {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: flex-start;
}
.notify-form input[type="email"],
.notify-form input[type="text"] {
  flex: 1;
  min-width: 200px;
  padding: 0.6rem 0.75rem;
  border: 1px solid var(--coin-border);
  border-radius: 6px;
  font-size: 0.9rem;
  background: #fff;
}
.notify-form input:focus {
  border-color: var(--coin-gold) !important;
  outline: none;
  box-shadow: 0 0 0 3px rgba(218, 165, 32, 0.2);
}
.notify-form textarea {
  width: 100%;
  min-height: 80px;
  padding: 0.6rem 0.75rem;
  border: 1px solid var(--coin-border);
  border-radius: 6px;
  font-size: 0.9rem;
  font-family: inherit;
  resize: vertical;
  background: #fff;
}
.notify-form textarea:focus {
  border-color: var(--coin-gold) !important;
  outline: none;
  box-shadow: 0 0 0 3px rgba(218, 165, 32, 0.2);
}
.notify-form button {
  background-color: var(--coin-gold);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 0.6rem 1.5rem;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.2s;
}
.notify-form button:hover {
  background-color: var(--coin-gold-light);
}
.notify-form .form-row {
  display: flex;
  gap: 0.5rem;
  width: 100%;
  flex-wrap: wrap;
}
.notify-success {
  display: none;
  background: #065f46;
  color: #fff;
  padding: 1rem;
  border-radius: 6px;
  margin-top: 0.5rem;
  font-size: 0.9rem;
}

/* Sidebar footer — show version, hide theme credit */
.side-bar .site-footer {
  display: block !important;
  font-size: 0;
  line-height: 0;
  overflow: hidden;
}
/* Hide the bottom-of-page footer (mobile) theme credit */
footer .d-md-none {
  font-size: 0;
  line-height: 0;
  overflow: hidden;
}

/* Version number */
.site-version {
  font-size: 0.7rem !important;
  color: #64748b !important;
  margin: 0;
  padding: 0.25rem 0;
  letter-spacing: 0.05em;
  line-height: 1.4 !important;
}

/* CTA buttons — override gold link color (needs .main-content scope to beat .main-content a) */
.main-content a.cta-btn,
a.cta-btn {
  color: #fff !important;
  text-decoration: none !important;
}
.main-content a.cta-btn:hover,
a.cta-btn:hover {
  color: #f1f5f9 !important;
}

/* Content-area page footer */
.page-footer {
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--coin-border);
  text-align: center;
  font-size: 0.8rem;
  color: var(--coin-muted);
}
.page-footer a {
  color: var(--coin-muted) !important;
  text-decoration: none;
  margin: 0 0.5rem;
}
.page-footer a:hover {
  color: var(--coin-gold) !important;
}
.page-footer .footer-links {
  margin-bottom: 0.5rem;
}
.page-footer .footer-copy {
  font-size: 0.7rem;
  color: #9ca3af;
}

/* Spot price ticker bar */
.spot-ticker {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: center;
  justify-content: center;
  background: var(--coin-navy);
  color: #e2e8f0;
  padding: 0.6rem 1rem;
  border-radius: 8px;
  margin-bottom: 1.5rem;
  font-size: 0.85rem;
  border: 1px solid rgba(218, 165, 32, 0.3);
}
.spot-ticker-item {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  white-space: nowrap;
}
.spot-ticker-label {
  color: #94a3b8;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}
.spot-ticker-price {
  color: var(--coin-gold-light);
  font-weight: 700;
  font-size: 0.95rem;
}
.spot-ticker-sep {
  color: #475569;
  font-size: 0.7rem;
}
.spot-ticker-updated {
  color: #64748b;
  font-size: 0.7rem;
  width: 100%;
  text-align: center;
  margin-top: 0.1rem;
}
.spot-ticker-updated a {
  color: #64748b !important;
  text-decoration: none;
}
@media (max-width: 600px) {
  .spot-ticker {
    gap: 0.4rem;
    padding: 0.5rem 0.75rem;
    font-size: 0.8rem;
  }
  .spot-ticker-price {
    font-size: 0.85rem;
  }
}

/* === Hero Map Animation === */
.hero-map-container {
  position: relative;
  width: 100%;
  padding: 0.5rem 1rem 0.5rem;
  margin: 0 0 1.5rem 0;
  background: #000000;
  overflow: hidden;
  border-radius: 8px;
}
.hero-map-container.animate-bg {
  animation: heroBgFade 3s ease-out 0.5s forwards;
}
@keyframes heroBgFade {
  0%   { background: #000000; }
  100% { background: linear-gradient(180deg, #000000 0%, #080e1a 30%, var(--coin-navy) 100%); }
}

.hero-map-perspective {
  perspective: 600px;
  max-width: 800px;
  margin: 0 auto;
}

#usa-canvas {
  display: block;
  width: 100%;
  aspect-ratio: 900 / 520;
  transform: rotateX(50deg) scale(1.15);
  transform-origin: center 65%;
}

.hero-map-text {
  text-align: center;
  color: #94a3b8;
  font-size: 0.9rem;
  margin-top: 0;
  padding-top: 0.25rem;
  letter-spacing: 0.05em;
}
.hero-map-count {
  color: var(--coin-gold-light);
  font-weight: 700;
  font-size: 1.3rem;
}

@media (max-width: 600px) {
  .hero-map-container {
    padding: 0.25rem 0.5rem 0.25rem;
  }
  #usa-canvas {
    transform: rotateX(45deg) scale(1.1);
  }
  .hero-map-text {
    font-size: 0.8rem;
  }
  .hero-map-count {
    font-size: 1.1rem;
  }
}
